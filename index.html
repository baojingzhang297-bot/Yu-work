<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>于系统后台管理演示</title>
  <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
  <style>
    :root {
      --brand: #1a3a5c;
      --brand-soft: #eaf0f6;
      --border: #d8e1ea;
      --bg: #f4f7fb;
      --text: #203142;
      --muted: #708195;
      --white: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    #app {
      height: 100vh;
    }

    .app-shell {
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      height: 64px;
      background: linear-gradient(135deg, #16324f 0%, #244d75 100%);
      color: var(--white);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      box-shadow: 0 8px 24px rgba(26, 58, 92, 0.18);
      z-index: 10;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .brand-mark {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .brand-text strong {
      display: block;
      font-size: 18px;
      line-height: 1.2;
    }

    .brand-text span {
      display: block;
      margin-top: 2px;
      font-size: 12px;
      opacity: 0.75;
    }

    .user-panel {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .user-meta {
      text-align: right;
      font-size: 13px;
      line-height: 1.4;
    }

    .layout-body {
      min-height: 0;
      flex: 1;
      display: flex;
    }

    .sidebar {
      background: var(--white);
      border-right: 1px solid var(--border);
      transition: width 0.2s ease;
      box-shadow: 0 12px 30px rgba(30, 52, 80, 0.04);
    }

    .sidebar-tools {
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0 12px;
      border-bottom: 1px solid #eef3f8;
    }

    .menu-wrap {
      height: calc(100vh - 64px - 52px);
      overflow: auto;
      padding: 12px 8px 16px;
    }

    .main-panel {
      flex: 1;
      min-width: 0;
      padding: 24px;
      overflow: auto;
      background:
        radial-gradient(circle at top right, rgba(26, 58, 92, 0.08), transparent 30%),
        linear-gradient(180deg, #f8fbfe 0%, #f4f7fb 100%);
    }

    .page-card {
      background: var(--white);
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 18px 50px rgba(20, 42, 67, 0.08);
      border: 1px solid rgba(216, 225, 234, 0.75);
    }

    .page-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    .page-head h2 {
      margin: 0;
      color: var(--brand);
      font-size: 26px;
      font-weight: 700;
    }

    .page-head p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .toolbar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px;
      margin-bottom: 20px;
    }

    .stat-card {
      background: linear-gradient(180deg, #ffffff 0%, #f7fafe 100%);
      border: 1px solid #e7edf5;
      border-radius: 14px;
      padding: 16px 18px;
    }

    .stat-card .label {
      font-size: 13px;
      color: var(--muted);
    }

    .stat-card .value {
      margin-top: 10px;
      font-size: 28px;
      font-weight: 700;
      color: var(--brand);
    }

    .filter-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px;
      margin-bottom: 18px;
    }

    .section-title {
      margin: 26px 0 14px;
      font-size: 18px;
      color: var(--brand);
      font-weight: 700;
    }

    .el-menu {
      border-right: none;
    }

    .el-menu-item.is-active,
    .el-sub-menu .el-menu-item.is-active {
      background: var(--brand-soft);
      color: var(--brand);
      font-weight: 700;
    }

    .el-sub-menu .el-menu-item {
      padding-left: 64px !important;
    }

    .el-sub-menu__title {
      font-weight: 700;
    }

    .el-button--primary {
      --el-button-bg-color: var(--brand);
      --el-button-border-color: var(--brand);
      --el-button-hover-bg-color: #244d75;
      --el-button-hover-border-color: #244d75;
      --el-button-active-bg-color: #122b44;
      --el-button-active-border-color: #122b44;
    }

    .el-tag {
      border-radius: 999px;
      padding: 0 10px;
    }

    .case-search-panel {
      background: linear-gradient(180deg, #fbfdff 0%, #f5f8fc 100%);
      border: 1px solid #e4ebf3;
      border-radius: 16px;
      padding: 14px 16px;
      margin-bottom: 14px;
    }

    .case-search-grid {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .case-search-head {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
      margin-bottom: 10px;
    }

    .search-toggle-btn {
      padding: 4px 6px;
      color: var(--brand);
    }

    .case-search-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px 16px;
    }

    .case-search-grid.compact .search-field:nth-child(n + 7) {
      display: none;
    }

    .search-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }

    .search-field.full-width {
      grid-column: 1 / -1;
    }

    .search-label {
      display: block;
      margin-bottom: 0;
      color: var(--brand);
      font-size: 12px;
      font-weight: 700;
      white-space: normal;
      text-align: left;
    }

    .ship-company-wrap {
      display: grid;
      grid-template-columns: 110px minmax(0, 1fr);
      gap: 8px;
    }

    .check-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 16px;
      min-height: 34px;
      align-items: center;
      padding: 4px 0;
    }

    .compact-input {
      max-width: 100%;
    }

    .compact-date-range {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
      gap: 8px;
      align-items: center;
    }

    .search-actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 10px;
    }

    .case-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 10px;
    }

    .table-note {
      color: var(--muted);
      font-size: 13px;
    }

    .case-toolbar .table-note {
      margin-left: auto;
      text-align: right;
    }

    .case-table .cell {
      word-break: keep-all;
    }

    .operation-links {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 2px 8px;
      line-height: 1.4;
    }

    .action-link {
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
      text-decoration: none;
      white-space: nowrap;
    }

    .case-link {
      color: var(--brand);
      font-weight: 700;
      text-decoration: underline;
    }

    .case-link:hover {
      text-decoration: underline;
    }

    .action-edit {
      color: #1a3a5c;
    }

    .action-copy {
      color: #227a52;
    }

    .action-view {
      color: #b06a00;
    }

    .action-delete {
      color: #c0392b;
    }

    .symbol-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 28px;
      height: 28px;
      padding: 0 8px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 13px;
      border: 1px solid #dbe4ee;
      background: #f8fbff;
    }

    .symbol-ok {
      color: #227a52;
      border-color: #cfe7db;
      background: #f2fbf6;
    }

    .symbol-partial {
      color: #b06a00;
      border-color: #ecd9af;
      background: #fff9eb;
    }

    .symbol-none {
      color: #7d8a98;
      border-color: #dde5ec;
      background: #f7f9fb;
    }

    .case-form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px 20px;
    }

    .sub-card {
      border: 1px solid #e4ebf3;
      border-radius: 16px;
      padding: 18px;
      background: #fbfdff;
    }

    .sub-card + .sub-card {
      margin-top: 18px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--brand);
      font-weight: 700;
      margin-bottom: 14px;
      cursor: pointer;
    }

    .form-card {
      border-radius: 18px;
      border: 1px solid rgba(216, 225, 234, 0.9);
      box-shadow: 0 18px 50px rgba(20, 42, 67, 0.08);
    }

    .form-section {
      padding-bottom: 20px;
      margin-bottom: 20px;
    }

    .form-section:last-child {
      margin-bottom: 0;
      padding-bottom: 0;
    }

    .form-section.no-top-line {
      padding-top: 0;
      margin-top: 0;
    }

    .form-section-title {
      margin: 0 0 16px;
      padding-bottom: 10px;
      color: var(--brand);
      font-size: 18px;
      font-weight: 700;
      border-bottom: 2px solid #e8eef5;
    }

    .form-section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .section-toggle-btn {
      color: var(--brand);
      padding: 4px 6px;
    }

    .readonly-block {
      pointer-events: none;
    }

    .business-form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px 20px;
      padding: 16px;
      border-radius: 14px;
      background: #f7fafe;
      border: 1px solid #e6edf5;
    }

    .business-form-grid .el-form-item {
      margin-bottom: 14px;
    }

    .business-form-grid .full-row {
      grid-column: 1 / -1;
    }

    .item-name-left .el-form-item__label {
      text-align: left;
      justify-content: flex-start;
    }

    .plain-form-grid {
      padding: 0;
      background: transparent;
      border: none;
      border-radius: 0;
    }

    .inline-pair {
      display: grid;
      grid-template-columns: 120px minmax(0, 1fr);
      gap: 8px;
      width: 100%;
    }

    .inline-triple {
      display: grid;
      grid-template-columns: 100px minmax(0, 1fr) minmax(0, 1fr);
      gap: 8px;
      width: 100%;
    }

    .address-block {
      display: grid;
      grid-template-columns: 140px minmax(0, 1fr);
      gap: 8px;
      width: 100%;
    }

    .new-case-table {
      margin-top: 14px;
    }

    .new-case-table .el-table__header th {
      background: #eef4fb;
      color: var(--brand);
    }

    .finance-list-table .el-table__header th {
      background: #eef4fb;
      color: var(--brand);
    }

    .currency-group {
      display: flex;
      flex-wrap: nowrap;
      gap: 8px;
      white-space: nowrap;
    }

    .ocr-cell {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
    }

    .ocr-dialog-layout {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 18px;
      min-height: 420px;
    }

    .ocr-upload-box,
    .ocr-preview-box,
    .ocr-result-box {
      border: 1px solid #e4ebf3;
      border-radius: 14px;
      background: #fbfdff;
    }

    .ocr-upload-box {
      padding: 16px;
      margin-bottom: 14px;
    }

    .ocr-preview-box {
      min-height: 320px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 12px;
    }

    .ocr-preview-box img,
    .ocr-preview-box iframe,
    .ocr-preview-box embed {
      width: 100%;
      height: 320px;
      object-fit: contain;
      border: none;
      background: #fff;
    }

    .ocr-result-box {
      padding: 16px;
    }

    .ocr-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-top: 14px;
    }

    .finance-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px 16px;
    }

    .finance-search-panel {
      margin-bottom: 14px;
      padding: 16px;
      border-radius: 14px;
      background: #f7fafe;
      border: 1px solid #e6edf5;
    }

    .finance-grid .search-field {
      gap: 8px;
    }

    .finance-search-panel .search-actions {
      margin-top: 8px;
      padding-top: 0;
    }

    .finance-summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      margin-top: 18px;
    }

    .finance-stat {
      padding: 16px;
      border: 1px solid #e4ebf3;
      border-radius: 14px;
      background: linear-gradient(180deg, #ffffff 0%, #f7fafe 100%);
    }

    .finance-stat .label {
      color: var(--muted);
      font-size: 13px;
    }

    .finance-stat .value {
      margin-top: 8px;
      color: var(--brand);
      font-size: 24px;
      font-weight: 700;
    }

    .drawer-block + .drawer-block {
      margin-top: 18px;
    }

    .drawer-block h4 {
      margin: 0 0 10px;
      color: var(--brand);
      font-size: 16px;
    }

    .drawer-table-wrap {
      overflow-x: auto;
      padding-bottom: 6px;
    }

    .drawer-table-wrap .el-table {
      min-width: 860px;
    }

    .link-button {
      color: var(--brand);
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
    }

    .finance-form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px 20px;
      padding: 16px;
      border-radius: 14px;
      background: #f7fafe;
      border: 1px solid #e6edf5;
    }

    .finance-form-grid .el-form-item {
      margin-bottom: 14px;
    }

    .finance-form-grid .full-row {
      grid-column: 1 / -1;
    }

    .finance-tools {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin: 14px 0 10px;
    }

    .finance-calc-grid {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 16px;
      padding: 16px;
      border-radius: 14px;
      background: #f7fafe;
      border: 1px solid #e6edf5;
    }

    .rate-pair {
      display: grid;
      grid-template-columns: repeat(2, 160px);
      gap: 10px;
    }

    .rate-field {
      max-width: 160px;
    }

    .calc-inline-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      align-items: stretch;
    }

    .calc-item {
      min-width: 0;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid #e1e8f0;
      background: #ffffff;
    }

    .calc-item .label {
      color: var(--muted);
      font-size: 12px;
    }

    .calc-item .value {
      margin-top: 6px;
      color: var(--brand);
      font-size: 22px;
      font-weight: 700;
    }

    .billing-form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px 20px;
      padding: 16px;
      border-radius: 14px;
      background: #f7fafe;
      border: 1px solid #e6edf5;
    }

    .billing-form-grid .el-form-item {
      margin-bottom: 14px;
    }

    .billing-form-grid .full-row {
      grid-column: 1 / -1;
    }

    .currency-pair {
      display: grid;
      grid-template-columns: 110px 120px;
      gap: 8px;
      align-items: center;
      width: 100%;
    }

    .currency-quad {
      display: grid;
      grid-template-columns: 110px 120px 110px 120px;
      gap: 8px;
      align-items: center;
      width: 100%;
    }

    .settlement-row {
      display: grid;
      grid-template-columns: auto 240px auto auto 140px;
      gap: 12px;
      align-items: center;
      width: 100%;
    }

    .settlement-inline-label {
      display: inline-flex;
      align-items: center;
      justify-content: flex-end;
      line-height: 32px;
      justify-self: end;
      white-space: nowrap;
    }

    .detail-case-picker {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
    }

    .income-radio-row {
      display: flex;
      align-items: center;
      min-height: 32px;
    }

    .case-select-table .el-button {
      min-width: 72px;
    }

    .compact-summary-row {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-top: 12px;
    }

    .compact-summary-item {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .compact-summary-label {
      flex: 0 0 auto;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
    }

    .compact-summary-item .el-input {
      flex: 1 1 auto;
    }

    .billing-summary-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .template-options {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .master-dictionary {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 18px;
    }

    .master-side {
      border: 1px solid #e4ebf3;
      border-radius: 14px;
      background: #fbfdff;
      padding: 12px;
    }

    .master-detail {
      border: 1px solid #e4ebf3;
      border-radius: 14px;
      background: #fbfdff;
      padding: 14px;
    }

    .case-picker-row {
      display: grid;
      grid-template-columns: 240px auto;
      gap: 10px;
      align-items: center;
    }

    .new-case-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-top: 14px;
    }

    .bottom-actions {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 16px;
      margin-top: 28px;
    }

    .search-actions .el-button,
    .case-toolbar .el-button,
    .finance-tools .el-button,
    .bottom-actions .el-button,
    .new-case-actions .el-button {
      min-width: 104px;
    }

    .el-dialog__footer .el-button {
      min-width: 104px;
    }

    .case-table .el-table__cell {
      padding: 8px 0;
    }

    .case-table .el-table__header th {
      font-size: 12px;
    }

    .case-table .el-table__body td {
      font-size: 12px;
    }

    .table-pagination {
      display: flex;
      justify-content: flex-end;
      margin-top: 14px;
    }

    @media (max-width: 900px) {
      .topbar {
        padding: 0 14px;
      }

      .brand-text span,
      .user-meta {
        display: none;
      }

      .main-panel {
        padding: 14px;
      }

      .page-card {
        padding: 16px;
        border-radius: 14px;
      }

      .page-head {
        flex-direction: column;
        align-items: flex-start;
      }

      .case-search-grid,
      .case-form-grid,
      .business-form-grid,
      .finance-grid,
      .finance-form-grid,
      .finance-calc-grid,
      .finance-summary,
      .calc-inline-grid,
      .billing-form-grid,
      .billing-summary-grid,
      .master-dictionary {
        grid-template-columns: 1fr;
      }

      .case-search-grid,
      .search-field {
        grid-template-columns: 1fr;
      }

      .ship-company-wrap,
      .inline-pair,
      .inline-triple,
      .address-block,
      .rate-pair,
      .case-picker-row {
        grid-template-columns: 1fr;
      }

      .compact-date-range {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.prod.js"></script>
  <script src="https://unpkg.com/element-plus/dist/index.full.min.js"></script>
  <script src="https://unpkg.com/@element-plus/icons-vue/dist/index.iife.min.js"></script>
  <script>
    const {
      House,
      Briefcase,
      Money,
      Bell,
      Setting,
      User,
      Fold,
      Expand,
      Search,
      Plus,
      Document,
      Calendar,
      Check,
      Warning,
      ArrowLeft,
      Delete
    } = ElementPlusIconsVue;

      const currentPage = Vue.ref(1);
      const pageSize = Vue.ref(10);
      const total = Vue.computed(() => sourceRows.value.length);
      const pagedRows = Vue.computed(() => {
        const start = (currentPage.value - 1) * pageSize.value;
        return sourceRows.value.slice(start, start + pageSize.value);
      });
      const ensureCurrentPage = () => {
        const maxPage = Math.max(1, Math.ceil(total.value / pageSize.value));
        if (currentPage.value > maxPage) currentPage.value = maxPage;
      };
      const handleSizeChange = (size) => {
        pageSize.value = size;
        currentPage.value = 1;
      };
      const handleCurrentChange = (page) => {
        currentPage.value = page;
      };
      Vue.watch(() => total.value, ensureCurrentPage);
      return { currentPage, pageSize, total, pagedRows, handleSizeChange, handleCurrentChange };

              @current-change="handleCurrentChange"
            />
          </div>
        </div>
      `,
      setup() {
        const router = VueRouter.useRouter();
        const rows = userManagementStore.users;
        const filters = Vue.reactive({ username: "", role: "" });
        const filteredRows = Vue.computed(() => rows.filter(row =>
          (!filters.username || row.username.toLowerCase().includes(filters.username.toLowerCase())) &&
          (!filters.role || row.role === filters.role)
        ));
        const pagination = useTablePagination(filteredRows);
        const openNew = () => router.push("/user-management/new");
        const editRow = (row) => router.push({ path: "/user-management/new", query: { no: row.no } });
        const resetPassword = async (row) => {
          try {
            await ElementPlus.ElMessageBox.confirm(`${row.username} のパスワードをリセットしますか？`, "確認", { type: "warning" });
            ElementPlus.ElMessage.success("パスワードをリセットしました");
          } catch (error) {
            return;
          }
        };
        const removeRow = (index, row) => {
          const targetIndex = rows.findIndex(item => item.no === row.no);
          if (targetIndex >= 0) rows.splice(targetIndex, 1);
          rows.forEach((item, itemIndex) => { item.no = itemIndex + 1; });
        };
        return { filters, filteredRows, ...pagination, Search, Plus, Delete, openNew, editRow, resetPassword, removeRow };
      }
    };

    const UserNewPage = {
      template: `
        <div>

                    <el-input v-model="editing.username"></el-input>
                  </el-form-item>
                  <el-form-item label="パスワード" class="full-row" :required="!editing.no">
                    <el-input v-model="editing.password" show-password></el-input>
                  </el-form-item>
                  <el-form-item label="権限設定" class="full-row">
                    <el-radio-group v-model="editing.role">
                      <el-radio label="システム管理者">システム管理者</el-radio>
                      <el-radio label="業務担当者">業務担当者</el-radio>
                    </el-radio-group>
                  </el-form-item>
                  <el-form-item label="ステータス" class="full-row">
                    <el-switch v-model="editing.active"></el-switch>
                  </el-form-item>
                </div>
              </div>

              <div class="bottom-actions">
                <el-button type="primary" @click="save">保存</el-button>
                <el-button type="primary" plain @click="cancelEdit">取消</el-button>
              </div>
            </el-form>
          </el-card>
        </div>
      `,
      setup() {
        const route = VueRouter.useRoute();
        const router = VueRouter.useRouter();
        const rows = userManagementStore.users;
        const source = Vue.computed(() => rows.find(item => String(item.no) === String(route.query.no)));
        const editing = Vue.reactive({ no: null, username: "", password: "", role: "業務担当者", active: true });

        Vue.watchEffect(() => {
          if (source.value) Object.assign(editing, JSON.parse(JSON.stringify(source.value)));
          else Object.assign(editing, { no: null, username: "", password: "", role: "業務担当者", active: true });
        });

        const save = () => {
          if (!editing.username) {
            ElementPlus.ElMessage.warning("ユーザー名は必須です");
            return;
          }
          if (!editing.no && !editing.password) {
            ElementPlus.ElMessage.warning("パスワードは必須です");
            return;
          }
          if (editing.no) rows[rows.findIndex(item => item.no === editing.no)] = { ...editing };
          else rows.push({ ...editing, no: rows.length + 1 });
          ElementPlus.ElMessage.success("保存成功");
          router.push("/user-management/list");
        };
        const cancelEdit = () => router.push("/user-management/list");
        return { editing, save, cancelEdit };
      }
    };

    const activeCase = Vue.ref(null);
    const selectedCaseNo = Vue.ref("");
    const caseDialogVisible = Vue.ref(false);
    const basicCollapsed = Vue.ref(false);
    const otherCollapsed = Vue.ref(false);
    const exportDialogVisible = Vue.ref(false);
    const exportSelection = Vue.reactive({
      all: true,
      docs: ["Invoice", "B/L", "Packing List"],
      format: "PDF"
    });
    const caseOptions = Object.values(customsCaseDetails).map((item) => ({ caseNo: item.caseNo, caseName: item.caseName }));
    const todayString = () => {
      const now = new Date();
      const yyyy = now.getFullYear();
      const mm = String(now.getMonth() + 1).padStart(2, "0");
      const dd = String(now.getDate()).padStart(2, "0");
      return yyyy + "/" + mm + "/" + dd;
    };

    const emptyInvoiceForm = () => ({
      invNo: "",
      invDate: todayString(),
      shipper: "",
      consignee: "",
      vesselName: "",
      voyNo: "",
      etd: "",
      loadingPort: "",
      destination: "",
    });
    const emptyBlForm = () => ({
      customsTitle: "",
      notifyParty: "SAME AS CONSIGNEE",
      bookingNo: "",
      shippingLine: "",
      bookingAgent: "",
      arrivalDate: "",
      departureDate: "",
      placeOfReceipt: "",
      portOfLoading: "",
      via: "",
      portOfDischarge: "",
      placeOfDelivery: "",
      finalDestination: "",
      description: "",
      contactEmail: "",
      contactName: "",
      totalContainersText: "SAY: THREE(3) CONTAINER ONLY.-",
      freightPrepaidAt: "TOKYO JAPAN",
      freightPayableAt: "TOKYO JAPAN",
      placeOfIssue: "TOKYO JAPAN",
      blType: "Surrender",
      originalBLCount: "ONE (1)",
      remarks: ""
    });
    const invoiceForm = Vue.reactive(emptyInvoiceForm());
    const containerInfoRows = Vue.ref([]);
    const blForm = Vue.reactive(emptyBlForm());

    const descriptionText = (caseData) => {
      if (!caseData) return "";
      return [caseData.itemName || "", caseData.productName || ""].filter(Boolean).join(" / ");
    };
    const firstLine = (text) => (text || "").split("\n")[0] || "";
    const destinationHead = (text) => (text || "").split(",")[0] || "";
    const numberToWords = (num) => {
      const map = ["ZERO", "ONE", "TWO", "THREE", "FOUR", "FIVE", "SIX", "SEVEN", "EIGHT", "NINE", "TEN"];
      return map[num] || String(num);
    };
    const bagTotal = (containers) => containers.reduce((sum, item) => sum + Number(item.quantity || 0), 0);
    const grossTotal = (containers) => containers.reduce((sum, item) => sum + Number(item.grossWeight || 0), 0);
    const volumeTotalValue = (containers) => containers.reduce((sum, item) => sum + Number(item.volumeM3 || 0), 0);

    const resetAllForms = () => {
      Object.assign(invoiceForm, emptyInvoiceForm());
      containerInfoRows.value = [];
      Object.assign(blForm, emptyBlForm());
    };

    const applyCase = (caseNo) => {
      const caseData = customsCaseDetails[caseNo];
      selectedCaseNo.value = caseNo || "";
      activeCase.value = caseData || null;
      resetAllForms();
      if (!caseData) return;

      Object.assign(invoiceForm, {
        invNo: caseData.caseNo,
        invDate: todayString(),
        shipper: caseData.shipperDetail || "",
        consignee: caseData.consigneeDetail || "",
        vesselName: caseData.vesselName || "",
        voyNo: caseData.voyNo || "",
        etd: caseData.etd || "",
        loadingPort: caseData.loadingPortName || "",
        destination: caseData.finalDestinationName || ""
      });
      containerInfoRows.value = caseData.containers.map((item) => ({
        selected: true,
        containerNo: item.containerNo || "",
        sealNo: item.sealNo || "",
        size: item.size || "40HQ",
        quantity: String(item.quantity || ""),
        quantityUnit: item.quantityUnit || "BAGS",
        netWeight: String(item.netWeight || ""),
        grossWeight: String(item.grossWeight || ""),
        volumeM3: String(item.volumeM3 || ""),
        status: "Pick済"
      }));

      Object.assign(blForm, {
        customsTitle: firstLine(caseData.shipperDetail),
        notifyParty: "SAME AS CONSIGNEE",
        bookingNo: caseData.blNo || "",
        shippingLine: "NYOCC",
        bookingAgent: "NYOCC TOKYO",
        arrivalDate: caseData.etd || "",
        departureDate: caseData.etd || "",
        placeOfReceipt: caseData.loadingPortName || "",
        portOfLoading: caseData.loadingPortName || "",
        via: "",
        portOfDischarge: caseData.finalDestinationName || "",
        placeOfDelivery: caseData.finalDestinationName || "",
        finalDestination: caseData.finalDestinationName || "",
        description: "栄春贸易04/07 1本，04/09 1本，04/111本",
        contactEmail: "",
        contactName: "",
        totalContainersText: "SAY: " + numberToWords(caseData.containers.length) + "(" + caseData.containers.length + ") CONTAINER ONLY.-",
        freightPrepaidAt: "TOKYO JAPAN",
        freightPayableAt: "TOKYO JAPAN",
        placeOfIssue: "TOKYO JAPAN",
        blType: "Surrender",
        originalBLCount: "ONE (1)",
        remarks: ""
      });
    };

    const selectCase = (caseNo) => {
      applyCase(caseNo);
      caseDialogVisible.value = false;
    };
    const goBack = () => router.push(String(route.query.from || "/cases/customs"));
    const syncExportAllFlag = () => {
      exportSelection.all = exportSelection.docs.length === 3;
    };
    Vue.watch(() => exportSelection.docs.slice(), syncExportAllFlag, { deep: false });
    Vue.watch(() => exportSelection.all, (value) => {
      exportSelection.docs = value ? ["Invoice", "B/L", "Packing List"] : [];
    });
    const exportDocs = async () => {
      if (!activeCase.value) {
        ElementPlus.ElMessage.warning("先に案件を選択してください");
        return;
      }
      if (!exportSelection.docs.length) {
        ElementPlus.ElMessage.warning("出力対象を選択してください");
        return;
      }
      if (exportSelection.docs.includes("Packing List")) {
        const selectedCount = containerInfoRows.value.filter((item) => item.selected).length;
        const totalCount = containerInfoRows.value.length;
        if (!selectedCount) {
          ElementPlus.ElMessage.error("出力コンテナを指定してください。");
          return;
        }
        if (selectedCount < totalCount) {
          try {
            await ElementPlus.ElMessageBox.confirm(
              "PickingListでは、一部コンテナ情報を出力してよろしいでしょうか？",
              "確認",
              {
                type: "warning",
                confirmButtonText: "はい",
                cancelButtonText: "取消"
              }
            );
          } catch (error) {
            return;
          }
        }
      }
      exportDialogVisible.value = false;
      ElementPlus.ElMessage.success(exportSelection.format + "出力（Mock）: " + exportSelection.docs.join(" / "));
    };
    const allContainerRowsSelected = Vue.computed({
      get: () => containerInfoRows.value.length > 0 && containerInfoRows.value.every(item => item.selected),
      set: (value) => {
        containerInfoRows.value.forEach((item) => {
          item.selected = value;
        });
      }
    });
    const containerTotal = Vue.computed(() => containerInfoRows.value.length);
    const pieceTotal = Vue.computed(() => containerInfoRows.value.reduce((sum, item) => sum + Number(item.quantity || 0), 0).toLocaleString());
    const grossWeightTotal = Vue.computed(() => containerInfoRows.value.reduce((sum, item) => sum + Number(item.grossWeight || 0), 0).toLocaleString());
    const volumeTotal = Vue.computed(() => containerInfoRows.value.reduce((sum, item) => sum + Number(item.volumeM3 || 0), 0).toFixed(3));

    Vue.watch(
      () => route.query.caseNo,
      (caseNo) => {
        applyCase(caseNo || "");
      },
      { immediate: true }
    );

    return {
      activeCase,
      isReadonly,
      selectedCaseNo,
      caseDialogVisible,
      basicCollapsed,
      otherCollapsed,
      exportDialogVisible,
      exportSelection,
      caseOptions,
      allContainerRowsSelected,
      invoiceForm,
      containerInfoRows,
      blForm,
      selectCase,
      exportDocs,
      goBack,
      containerTotal,
      pieceTotal,
      grossWeightTotal,
      volumeTotal,
      Expand,
      Fold
    };
  }
};
